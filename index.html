<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Tickets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form action="https://formsubmit.co/fmaguinia@estudiogalicia.com" method="POST" id="ticketForm">
        
        <h2>Crear un nuevo ticket</h2>

        <input type="text" name="_honey" style="display:none">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://frozzz-xl.github.io/SISTEMA-DE-TICKETS/gracias.html">

        <div>
            <label for="nombre">Tu Nombre:</label>
            <input type="text" id="nombre" name="Nombre" placeholder="Ej: Juan Pérez" required>
        </div>

        <div>
            <label for="area">Área:</label>
            <select id="area" name="Area" required>
                <option value="" disabled selected>Selecciona tu área...</option>
                <option value="Call Center">Call Center</option>
                <option value="Incautación Vehicular">Incautación Vehicular</option>
                <option value="Judicial">Judicial</option>
                <option value="Área administrativa">Área administrativa</option>
                <option value="Gerencia">Gerencia</option>
            </select>
        </div>
        
        <div>
            <label for="asunto">Asunto del Ticket:</label>
            <input type="text" id="asunto" name="Asunto" placeholder="Resumen del problema" required>
        </div>
        
        <button type="submit" id="submitBtn">Enviar Ticket</button>
    </form>

    <script src="js/app.js"></script>
</body>
</html>
